<!-- ============================================================
     DADOSFERA · POP-UP DE CAPTAÇÃO (overlay lateral) — autocontido
     Cole em um bloco HTML do RD Station. Namespaced .dsf-cap-*
     Desliza pelo canto inferior direito após 6s (ou rolagem 40%).
     ============================================================ -->
<style>
  .dsf-cap{position:fixed;right:20px;bottom:20px;width:340px;max-width:calc(100% - 40px);background:#fff;border-radius:16px;box-shadow:0 18px 48px rgba(13,0,59,.3);z-index:99998;font-family:'Nunito',system-ui,sans-serif;transform:translateY(140%);transition:transform .45s cubic-bezier(.4,0,.2,1);overflow:hidden}
  .dsf-cap.dsf-on{transform:none}
  .dsf-cap__bar{background:linear-gradient(135deg,#1700A2,#1863DC);padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
  .dsf-cap__bar strong{color:#fff;font-family:'Sora',sans-serif;font-size:15px}
  .dsf-cap__close{background:rgba(255,255,255,.2);border:0;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1}
  .dsf-cap__body{padding:18px}
  .dsf-cap__body h3{margin:0 0 6px;font-family:'Sora',sans-serif;font-size:17px;color:#212121}
  .dsf-cap__body p{margin:0 0 14px;font-size:13px;color:#6B7280;line-height:1.5}
  .dsf-cap__body input{width:100%;box-sizing:border-box;padding:11px 13px;border:1.5px solid #C9CCEC;border-radius:9px;font-size:14px;margin-bottom:10px;font-family:inherit}
  .dsf-cap__body input:focus{outline:none;border-color:#1700A2;box-shadow:0 0 0 3px rgba(23,0,162,.14)}
  .dsf-cap__btn{width:100%;border:0;cursor:pointer;background:#1700A2;color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:999px;font-family:inherit}
  .dsf-cap__btn:hover{background:#1863DC}
</style>

<div class="dsf-cap" id="dsfCap" role="dialog" aria-label="Inscreva-se">
  <div class="dsf-cap__bar">
    <strong>📩 Receba novidades</strong>
    <button class="dsf-cap__close" aria-label="Fechar">×</button>
  </div>
  <div class="dsf-cap__body">
    <h3>Dados &amp; IA na sua caixa de entrada</h3>
    <p>Conteúdos práticos toda semana. Junte-se a milhares de profissionais de dados.</p>
    <form onsubmit="event.preventDefault();this.innerHTML='<p style=&quot;text-align:center;padding:8px 0;color:#0E8A50;font-weight:700;font-size:14px&quot;>✓ Inscrição confirmada!</p>';">
      <input type="text" placeholder="Seu nome" required>
      <input type="email" placeholder="Seu e-mail" required>
      <button class="dsf-cap__btn" type="submit">Quero me inscrever</button>
    </form>
  </div>
</div>

<script>
(function(){
  var box=document.getElementById('dsfCap'),shown=false,KEY='dsf-cap-seen';
  function open(){if(shown)return;try{if(localStorage.getItem(KEY))return;}catch(e){}shown=true;box.classList.add('dsf-on');}
  function close(){box.classList.remove('dsf-on');try{localStorage.setItem(KEY,'1');}catch(e){}}
  setTimeout(open,6000);
  window.addEventListener('scroll',function(){var h=document.documentElement;if((h.scrollTop+window.innerHeight)/h.scrollHeight>.4)open();},{passive:true});
  box.querySelector('.dsf-cap__close').addEventListener('click',close);
})();
</script>
