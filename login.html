<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Acesso | Dadosfera Design System</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/base.css" />
<script src="js/ds-auth.js"></script>

<style>
  body { height:100vh; display:flex; overflow:hidden; }
  .login-art {
    width:50%; position:relative; display:flex; align-items:center; justify-content:center;
    background: var(--ds-gradient-hero); color:#fff; overflow:hidden; padding:0 5rem;
  }
  .login-art::before, .login-art::after { content:""; position:absolute; border-radius:50%; filter:blur(8px); opacity:.5; }
  .login-art::before { width:520px; height:520px; border:1px dashed rgba(255,255,255,.25); animation: spin 60s linear infinite; }
  .login-art::after { width:340px; height:340px; background: radial-gradient(circle, rgba(59,191,240,.5), transparent 70%); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .login-orb {
    position:absolute; width:200px; height:200px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #3BBFF0, #1700A2 60%, #0D003B);
    box-shadow: 0 30px 80px rgba(0,0,0,.45); animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
  .login-art__txt { position:relative; z-index:2; }
  .login-art__txt h1 { color:#fff; font-size: clamp(2.5rem,4vw,3.5rem); line-height:1.1; }
  .login-art__txt em { font-style:normal; color: var(--ds-color-ciano); }
  .login-art__txt .outline { -webkit-text-stroke:1px rgba(255,255,255,.7); color:transparent; }

  .login-form { width:50%; display:flex; flex-direction:column; padding:3rem; background: var(--ds-bg); }
  .login-inner { max-width:380px; width:100%; margin:auto; display:flex; flex-direction:column; height:100%; justify-content:space-between; }
  .login-head { display:flex; align-items:center; gap:1rem; padding-top:1rem; }
  .login-head .x { opacity:.3; font-size:1.25rem; font-weight:300; }
  .login-main { padding:3rem 0; }
  .login-main h2 { font-size:2rem; margin-bottom:.5rem; }
  .login-err { display:none; gap:.5rem; align-items:center; background:#FDE8E8; border:1px solid #F5C2C2; color:#B12B2B; padding:.75rem 1rem; border-radius: var(--ds-radius-md); font-size:.85rem; margin-bottom:1rem; }
  .login-err.show { display:flex; }
  .login-foot { display:flex; align-items:center; gap:.5rem; color: var(--ds-text-soft); padding-bottom:1rem; font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; font-family: var(--ds-font-mono); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .shake { animation: shake .35s ease; }
  @media (max-width:900px){ .login-art{display:none} .login-form{width:100%} }
</style>
</head>
<body>

  <div class="login-art">
    <div class="login-orb"></div>
    <div class="login-art__txt">
      <h1>Dados em<br/><em>esfera</em><br/><span class="outline">inteligente</span></h1>
    </div>
  </div>

  <div class="login-form">
    <div class="login-inner">
      <header class="login-head">
        <svg viewBox="0 0 40 40" style="width:34px;height:34px"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1700A2"/><stop offset="1" stop-color="#3BBFF0"/></linearGradient></defs><circle cx="20" cy="20" r="18" fill="url(#lg)"/><ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="#fff" stroke-opacity=".55" stroke-width="1.5"/><circle cx="20" cy="20" r="4.5" fill="#fff"/></svg>
        <span class="x">×</span>
        <strong style="font-family:var(--ds-font-display);font-size:1.1rem">8D Hubify</strong>
      </header>

      <main class="login-main">
        <h2>Acesso restrito</h2>
        <p class="ds-text-soft" style="font-size:.9rem;margin-bottom:2rem">Insira suas credenciais para acessar o design system.</p>

        <div class="login-err" id="err"><i class="fi fi-rr-exclamation"></i><span>Usuário ou senha incorretos.</span></div>

        <form id="form" novalidate class="ds-stack">
          <div class="ds-field">
            <label class="ds-label" for="user">Identificação</label>
            <input class="ds-input" id="user" type="text" placeholder="seu usuário" autocomplete="username" />
          </div>
          <div class="ds-field">
            <label class="ds-label" for="pass">Chave de acesso</label>
            <input class="ds-input" id="pass" type="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="ds-btn ds-btn--primary ds-btn--lg" id="btn" type="submit" style="width:100%;margin-top:.5rem">
            <span id="btn-lbl">Inicializar sessão</span> <i class="fi fi-rr-arrow-right"></i>
          </button>
        </form>
      </main>

      <footer class="login-foot">Powered by <strong style="color:var(--ds-color-nucleo)">8D&nbsp;Hubify</strong></footer>
    </div>
  </div>

  <script>
    if (DSAuth.isAuthed()) location.replace('index.html');
    var form = document.getElementById('form'), err = document.getElementById('err'),
        u = document.getElementById('user'), p = document.getElementById('pass'),
        btn = document.getElementById('btn'), lbl = document.getElementById('btn-lbl');
    function fail(msg){ err.querySelector('span').textContent = msg || 'Usuário ou senha incorretos.'; err.classList.add('show','shake'); setTimeout(function(){err.classList.remove('shake')},400); }
    [u,p].forEach(function(i){ i.addEventListener('input', function(){ err.classList.remove('show'); }); });
    form.addEventListener('submit', function(e){
      e.preventDefault();
      if(!u.value.trim() || !p.value){ fail('Preencha todos os campos.'); return; }
      btn.disabled = true; lbl.textContent = 'Verificando…';
      setTimeout(function(){
        if(DSAuth.login(u.value.trim(), p.value)){ lbl.textContent = 'Acesso concedido'; setTimeout(function(){location.replace('index.html')},400); }
        else { fail(); btn.disabled = false; lbl.textContent = 'Inicializar sessão'; p.value=''; p.focus(); }
      }, 450);
    });
    u.focus();
  </script>
</body>
</html>
