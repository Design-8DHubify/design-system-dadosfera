<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acesso | Dadosfera Design System</title>

  <script src="js/ds-auth.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tipografia da marca Dadosfera -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  </style>

  <!-- Bibliotecas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Sora', 'sans-serif'],
            sans: ['Nunito', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace']
          },
          colors: {
            cometa: '#1700A2',
            'cometa-light': '#3BBFF0',
            base: '#0D003B',
            creme: '#F7F8FC',
            surface: 'rgba(247,248,252,0.035)',
            'surface-2': 'rgba(247,248,252,0.06)',
            dsborder: 'rgba(247,248,252,0.08)',
            'dsborder-strong': 'rgba(247,248,252,0.16)'
          }
        }
      }
    }
  </script>

  <style>
    .noise-bg {
      position: absolute; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:0; opacity:0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }
    .ds-input {
      background: rgba(13,0,59,0.04);
      border: 1px solid rgba(13,0,59,0.15);
      color: #0D003B;
      transition: all 0.3s ease;
    }
    .ds-input:focus {
      border-color: #1700A2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(23,0,162,.15);
      background: rgba(13,0,59,0.02);
    }
    .ds-input::placeholder { color: rgba(13,0,59,0.4); }
    .ds-input.error {
      border-color: rgba(220,50,50,.7);
      box-shadow: 0 0 0 3px rgba(220,50,50,.12);
    }
    .brand-glow:hover {
      filter: drop-shadow(0 0 12px #3BBFF0);
      transition: filter 0.3s ease;
    }
    .text-outline {
      -webkit-text-stroke: 1px #F7F8FC;
      color: transparent;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-7px)}
      40%{transform:translateX(7px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body class="bg-base text-creme font-sans h-screen w-full flex overflow-hidden selection:bg-cometa selection:text-creme">

  <div class="noise-bg"></div>

  <!-- ── Coluna Esquerda: 3D + texto ── -->
  <div class="hidden lg:flex w-1/2 relative items-center justify-center border-r border-dsborder-strong z-10 bg-base overflow-hidden" id="canvas-container">

    <canvas id="hero-canvas" class="absolute inset-0 w-full h-full z-0 pointer-events-none"></canvas>

    <div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none z-10">
      <div class="w-[500px] h-[500px] border-[1px] border-dashed border-cometa/40 rounded-full animate-[spin_60s_linear_infinite] absolute"></div>
    </div>

    <div class="z-20 w-full text-left max-w-lg px-12 lg:px-20 gs-reveal pointer-events-none">
      <h1 class="font-display text-5xl lg:text-6xl mb-6 leading-[1.1] tracking-[-0.03em] text-creme">
        Organize seus<br/>
        <em class="text-cometa-light not-italic">Dados</em><br/>
        <span class="text-outline">Otimize Decisões</span>
      </h1>
    </div>
  </div>

  <!-- ── Coluna Direita: Formulário ── -->
  <div class="w-full lg:w-1/2 flex flex-col relative z-10 bg-creme text-base p-8 lg:p-12 xl:p-16">

    <div class="w-full max-w-sm mx-auto flex flex-col h-full justify-between">

      <!-- Header: 8D × Dadosfera -->
      <header class="w-full flex justify-between items-center gs-form-item pt-4">
        <div class="flex items-center gap-4">
          <!-- Símbolo 8D Hubify -->
          <svg viewBox="0 0 469.28 333.7" class="w-8 h-auto fill-base flex-shrink-0">
            <path d="M298.45,295.98c-8.94-64.31-58.65-115.58-122.2-126.82,63.55-11.25,113.26-62.51,122.2-126.82,8.94,64.31,58.65,115.58,122.2,126.82-63.54,11.25-113.26,62.51-122.2,126.82M313.01,0h-14.46c-.03.25-.06.51-.09.76-.03-.25-.06-.51-.1-.76H1.54C.53,7.02,0,14.2,0,21.51c0,73.84,53.37,135.21,123.64,147.65C53.37,181.59,0,242.96,0,316.8c0,5.71.33,11.35.95,16.9h312.08c86.3-.01,156.25-69.97,156.25-156.28v-21.15C469.28,69.97,399.32,0,313.01,0"/>
          </svg>

          <span class="text-base/20 font-light text-xl">×</span>

          <!-- Logo Dadosfera (oficial — fundo claro) -->
          <img src="assets/logotipos/logo-dadosfera.png" alt="Dadosfera" class="h-7 w-auto object-contain" />
        </div>
      </header>

      <!-- Centro: Formulário -->
      <main class="w-full flex flex-col justify-center py-12">
        <div class="mb-10 gs-form-item text-left">
          <h2 class="font-display text-4xl mb-3 tracking-[-0.02em] text-base">Acesso restrito</h2>
          <p class="text-base/70 text-sm font-light">Insira suas credenciais corporativas.</p>
        </div>

        <!-- Mensagem de erro -->
        <div id="err-box" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm font-medium">
          <span id="err-msg">Usuário ou senha incorretos.</span>
        </div>

        <form id="login-form" class="space-y-6" novalidate>

          <!-- Usuário -->
          <div class="space-y-2 gs-form-item">
            <label for="user-input" class="text-[0.65rem] font-semibold tracking-[0.1em] uppercase text-base/70 font-mono">Identificação</label>
            <div class="relative">
              <input type="text" id="user-input" placeholder="seu usuário" autocomplete="username" spellcheck="false"
                class="ds-input w-full py-3 px-4 rounded-lg text-sm">
            </div>
          </div>

          <!-- Senha -->
          <div class="space-y-2 gs-form-item">
            <div class="flex justify-between items-center">
              <label for="pass-input" class="text-[0.65rem] font-semibold tracking-[0.1em] uppercase text-base/70 font-mono">Chave de Acesso</label>
            </div>
            <div class="relative">
              <input type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password"
                class="ds-input w-full py-3 pl-4 pr-20 rounded-lg text-sm">
              <button type="button" id="toggle-pass" class="absolute right-3 top-1/2 -translate-y-1/2 text-[0.65rem] font-mono uppercase tracking-[0.08em] text-base/60 hover:text-cometa transition-colors">Mostrar</button>
            </div>
          </div>

          <!-- Botão -->
          <div class="pt-2 gs-form-item">
            <button type="submit" id="submit-btn"
              class="magnetic-btn w-full bg-gradient-to-br from-cometa to-[#1863DC] text-creme font-semibold py-3.5 rounded-full text-sm tracking-wide hover:shadow-[0_4px_20px_rgba(23,0,162,0.4)] transition-all flex items-center justify-center gap-2 relative overflow-hidden group">
              <span class="relative z-10" id="btn-label">INICIALIZAR SESSÃO</span>
            </button>
          </div>
        </form>
      </main>

      <!-- Footer: Assinatura 8D -->
      <footer class="w-full flex justify-start items-center gs-form-item pb-4">
        <div class="flex items-center gap-2 text-base/60 group cursor-pointer">
          <span class="text-[0.65rem] font-mono uppercase tracking-[0.1em]">Powered by</span>

              <path d="M102.74,62.96v-.78c9.91-4.66,14.96-13.41,14.96-26.04C117.7,12.05,100.6,0,66.21,0h-10.64C21.18,0,4.08,12.05,4.08,36.14c0,12.63,5.05,21.38,14.96,26.04v.78C6.41,66.46,0,75,0,88.8c0,27.59,17.88,41.39,53.82,41.39h14.13c35.95,0,53.82-13.8,53.82-41.39,0-13.8-6.41-22.34-19.04-25.84M56.93,35.95h7.91c4.86,0,7.38,2.53,7.38,7.77s-2.53,7.77-7.58,7.77h-7.53c-5.05,0-7.58-2.53-7.58-7.77s2.53-7.77,7.38-7.77M66.21,95.02h-10.64c-4.86,0-7.38-2.53-7.38-7.77s2.33-7.77,7.19-7.77h11.02c4.86,0,7.19,2.53,7.19,7.77s-2.53,7.77-7.38,7.77"/>

            </svg>
          </div>
        </div>
      </footer>

  </div>

  <script>
    // ── Toggle senha ──
    const toggleBtn = document.getElementById('toggle-pass');
    const passInput = document.getElementById('pass-input');
    toggleBtn.addEventListener('click', () => {
      const isHidden = passInput.type === 'password';
      passInput.type = isHidden ? 'text' : 'password';
      toggleBtn.textContent = isHidden ? 'Ocultar' : 'Mostrar';
    });

    // ── Login ──
    const form    = document.getElementById('login-form');
    const userInp = document.getElementById('user-input');
    const passInp = document.getElementById('pass-input');
    const errBox  = document.getElementById('err-box');
    const errMsg  = document.getElementById('err-msg');
    const btnLabel = document.getElementById('btn-label');
    const submitBtn = document.getElementById('submit-btn');

    if (window.DSAuth && DSAuth.isAuthed()) window.location.replace('index.html');

    function showError(msg) {
      errMsg.textContent = msg || 'Usuário ou senha incorretos.';
      errBox.classList.remove('hidden');
      userInp.classList.add('error');
      passInp.classList.add('error');
      errBox.classList.add('shake');
      setTimeout(() => errBox.classList.remove('shake'), 400);
    }

    function clearError() {
      errBox.classList.add('hidden');
      userInp.classList.remove('error');
      passInp.classList.remove('error');
    }

    userInp.addEventListener('input', clearError);
    passInp.addEventListener('input', clearError);

    form.addEventListener('submit', e => {
      e.preventDefault();
      const u = userInp.value.trim();
      const p = passInp.value;
      if (!u || !p) { showError('Preencha todos os campos.'); return; }

      submitBtn.disabled = true;
      btnLabel.textContent = 'Verificando…';

      setTimeout(() => {
        if (window.DSAuth && window.DSAuth.login(u, p)) {
          btnLabel.textContent = 'Acesso concedido';
          setTimeout(() => window.location.replace('index.html'), 500);
        } else {
          showError('Usuário ou senha incorretos.');
          submitBtn.disabled = false;
          btnLabel.textContent = 'INICIALIZAR SESSÃO';
          passInp.value = '';
          passInp.focus();
        }
      }, 500);
    });

    // ── 3D Three.js (ampulheta — idêntico ao modelo 8D) ──
    (function initHero3D() {
      const container = document.getElementById('canvas-container');
      const canvas = document.getElementById('hero-canvas');
      if (!container || !canvas) return;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
      camera.position.z = 4.0;

      const pointLight = new THREE.PointLight(0x1700A2, 5, 20);
      scene.add(pointLight);
      const pointLight2 = new THREE.PointLight(0xF7F8FC, 2.5, 20);
      scene.add(pointLight2);
      scene.add(new THREE.AmbientLight(0xF7F8FC, 0.15));

      const material = new THREE.MeshPhysicalMaterial({
        color: 0x0D003B, metalness: 0.2, roughness: 0.15,
        transmission: 0.9, ior: 1.8, thickness: 2.0
      });
      const wireMaterial = new THREE.LineDashedMaterial({
        color: 0x3BBFF0, transparent: true, opacity: 0.8,
        dashSize: 0, gapSize: 100
      });

      const heroGroup = new THREE.Group();
      scene.add(heroGroup);

      const loader = new THREE.OBJLoader();
      loader.load('https://raw.githubusercontent.com/Design-8DHubify/8dh/a1c0eca014e19014154669658ac5baef1d04cec0/Ampulheta-Final.obj', obj => {
        obj.traverse(child => {
          if (child.isMesh) {
            child.material = material;
            child.geometry.computeVertexNormals();
            const edges = new THREE.EdgesGeometry(child.geometry);
            const line  = new THREE.LineSegments(edges, wireMaterial);
            line.computeLineDistances();
            heroGroup.add(line);
          }
        });
        const box = new THREE.Box3().setFromObject(obj);
        obj.position.sub(box.getCenter(new THREE.Vector3()));
        const scale = 2.8 / box.getSize(new THREE.Vector3()).length();
        obj.scale.set(scale, scale, scale);
        heroGroup.add(obj);

        gsap.timeline({ repeat: -1, yoyo: true })
          .to(wireMaterial, { dashSize: 100, duration: 3, ease: 'power2.inOut' });
      });

      let mX = 0, mY = 0;
      container.addEventListener('mousemove', e => {
        const r = container.getBoundingClientRect();
        mX =  ((e.clientX - r.left) / r.width)  * 2 - 1;
        mY = -((e.clientY - r.top)  / r.height) * 2 + 1;
      });

      window.addEventListener('resize', () => {
        if (container.clientWidth > 0) {
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        }
      });

      const clock = new THREE.Clock();
      (function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if (heroGroup.children.length) {
          heroGroup.rotation.y += 0.003;
          heroGroup.position.y  = Math.sin(t * 0.8) * 0.1;
          heroGroup.rotation.z  = Math.sin(t * 0.3) * 0.05 + mX * 0.1;
          heroGroup.rotation.x  = Math.cos(t * 0.4) * 0.05 - mY * 0.1;
        }
        pointLight.position.x += (mX * 3 - pointLight.position.x) * 0.05;
        pointLight.position.y += (mY * 3 - pointLight.position.y) * 0.05;
        pointLight.position.z  = 2;
        pointLight2.position.x = Math.cos(t * 0.5) * 3;
        pointLight2.position.z = Math.sin(t * 0.5) * 3 - 1;
        renderer.render(scene, camera);
      })();

      gsap.fromTo(camera.position, { z: 6.5 }, { z: 4.0, duration: 2.5, ease: 'power3.out' });
    })();

    // ── Animações GSAP ──
    document.addEventListener('DOMContentLoaded', () => {
      gsap.fromTo('.gs-reveal',
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 1, stagger: 0.2, ease: 'power3.out', delay: 0.2 }
      );
      gsap.fromTo('.gs-form-item',
        { x: 20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.8, stagger: 0.1, ease: 'power2.out', delay: 0.4 }
      );

      const magneticBtn = document.querySelector('.magnetic-btn');
      if (magneticBtn) {
        magneticBtn.addEventListener('mousemove', e => {
          const r = magneticBtn.getBoundingClientRect();
          gsap.to(magneticBtn, {
            x: (e.clientX - r.left - r.width  / 2) * 0.15,
            y: (e.clientY - r.top  - r.height / 2) * 0.15,
            duration: 0.4, ease: 'power2.out'
          });
        });
        magneticBtn.addEventListener('mouseleave', () => {
          gsap.to(magneticBtn, { x: 0, y: 0, duration: 0.7, ease: 'elastic.out(1,0.3)' });
        });
      }

      userInp.focus();
    });
  </script>
</body>
</html>
