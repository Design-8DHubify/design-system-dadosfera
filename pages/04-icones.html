<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Ícones | Dadosfera Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" />
<link rel="stylesheet" href="../css/tokens.css" />
<link rel="stylesheet" href="../css/base.css" />
<link rel="stylesheet" href="../css/components.css" />
<link rel="stylesheet" href="../css/showcase.css" />
<script>(function(){try{var t=localStorage.getItem('ds-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<script src="../js/ds-auth.js"></script><script>DSAuth.guard();</script>
<style>
  .ico-toolbar { display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-end; background:var(--ds-surface); border:1px solid var(--ds-border); border-radius:var(--ds-radius-lg); padding:var(--ds-space-5); margin-bottom:var(--ds-space-5); position:sticky; top:64px; z-index:5; }
  .ico-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:.75rem; }
  .ico { display:flex; flex-direction:column; align-items:center; gap:.5rem; padding:1rem .5rem; border:1px solid var(--ds-border); border-radius:var(--ds-radius-md); background:var(--ds-surface); cursor:pointer; transition:transform var(--ds-dur-fast),border-color var(--ds-dur-fast); }
  .ico:hover { transform:translateY(-3px); border-color:var(--ds-color-nucleo); }
  .ico span { font-size:.65rem; color:var(--ds-text-soft); word-break:break-all; text-align:center; }
</style>
</head>
<body>
  <div id="ds-shell" data-active="icones"></div>

  <main class="docs-main">
    <div class="docs-topbar">
      <button class="docs-burger" data-burger aria-label="Menu"><i class="fi fi-rr-menu-burger"></i></button>
      <strong style="font-family:var(--ds-font-display)">Ícones</strong>
      <button class="ds-theme-toggle" data-theme-toggle aria-label="Tema"><i class="fi fi-rr-moon-stars"></i></button>
    </div>

    <div class="docs-content" style="max-width:1320px">
      <header class="docs-hero">
        <span class="ds-overline">Uicons · Flaticon</span>
        <h1>Galeria de ícones</h1>
        <p class="ds-lead">Clique para <strong>copiar o HTML</strong> com a cor e tamanho escolhidos. <strong>Alt+clique</strong> baixa o ícone em PNG.</p>
      </header>

      <div class="ico-toolbar">
        <div class="ds-field" style="flex:1;min-width:200px"><label class="ds-label">Buscar</label><input class="ds-input" id="ico-search" placeholder="ex: chart, rocket, brain…"></div>
        <div class="ds-field"><label class="ds-label">Cor</label><input type="color" id="ico-color" value="#1700A2" style="height:46px;width:64px;padding:2px;border:1px solid var(--ds-border-strong);border-radius:var(--ds-radius-md)"></div>
        <div class="ds-field" style="min-width:160px"><label class="ds-label">Tamanho · <span id="ico-sizeval">48px</span></label><input type="range" id="ico-size" min="16" max="96" value="48"></div>
        <span class="ds-badge" id="ico-count">—</span>
      </div>

      <div class="ico-grid" id="ico-grid"></div>
    </div>
  </main>

  <script src="../js/ds-clipboard.js"></script>
  <script src="../js/ds-ui.js"></script>
  <script src="../js/ds-icons.js"></script>
  <script src="../js/ds-shell.js"></script>
</body>
</html>
