<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

<style>
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ds-gradient-hero); color:#fff; text-align:center; padding:2rem; }
  .ty { max-width:560px; }
  .ty__check { width:96px; height:96px; border-radius:50%; background:rgba(255,255,255,.14); display:grid; place-items:center; margin:0 auto 2rem; animation:pop .5s var(--ds-ease); }
  .ty__check svg { width:46px; height:46px; }
  @keyframes pop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .ty h1 { color:#fff; font-size:var(--ds-text-display); }
  .ty p { color:rgba(255,255,255,.85); font-size:var(--ds-text-body-lg); margin:1rem 0 2rem; }
  .ty__links { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>
  <div class="ty">
    <div class="ty__check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3BBFF0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span class="ds-overline" style="color:#9ad6f5">Recebido com sucesso</span>
    <h1>Obrigado!</h1>
    <p>Sua solicitação foi enviada. Nosso time entrará em contato em breve. Enquanto isso, que tal explorar nossos conteúdos?</p>
    <div class="ty__links">
      <a class="ds-btn ds-btn--light ds-btn--lg" href="05-landing-page.html">Voltar ao site</a>
      <a class="ds-btn ds-btn--ghost ds-btn--lg" style="color:#fff;border-color:rgba(255,255,255,.4)" href="#">Ver blog</a>
    </div>
  </div>
</body>
</html>
